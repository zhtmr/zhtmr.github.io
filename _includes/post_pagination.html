{% if page.previous or page.next %}
  <nav class="pagination pagination--posts">
    {% if page.previous %}
      <a href="{{ page.previous.url | relative_url }}" class="pagination--pager pager--prev">
        <span class="pager__label">← 이전 글</span>
        <span class="pager__title">{{ page.previous.title | markdownify | strip_html }}</span>
      </a>
    {% else %}
      <span class="pagination--pager pager--prev is-disabled">
        <span class="pager__label">← 이전 글</span>
        <span class="pager__title">—</span>
      </span>
    {% endif %}
    {% if page.next %}
      <a href="{{ page.next.url | relative_url }}" class="pagination--pager pager--next">
        <span class="pager__label">다음 글 →</span>
        <span class="pager__title">{{ page.next.title | markdownify | strip_html }}</span>
      </a>
    {% else %}
      <span class="pagination--pager pager--next is-disabled">
        <span class="pager__label">다음 글 →</span>
        <span class="pager__title">—</span>
      </span>
    {% endif %}
  </nav>
{% endif %}
